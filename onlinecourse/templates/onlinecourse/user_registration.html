<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'onlinecourse:popular_course_list' %}">
            Online Course
        </a>

        <div class="ml-auto">
            <a class="btn btn-link" href="{% url 'onlinecourse:login' %}">
                Login
            </a>
        </div>
    </div>
</nav>

<form action="{% url 'onlinecourse:registration' %}" method="post">
    <div class="container">
        {% csrf_token %}
        <h1>Sign Up</h1>
        <hr>

        <div class="form-group">
            <label for="username"><b>User Name</b></label>
            <input type="text" class="form-control" placeholder="Enter User Name: " name="username" required>

            <label for="firstname"><b>First Name</b></label>
            <input type="text" class="form-control" placeholder="Enter First Name: " name="firstname" required>

            <label for="lastname"><b>Last Name</b></label>
            <input type="text" class="form-control" placeholder="Enter Last Name: " name="lastname" required>

            <label for="psw"><b>Password</b></label>
            <input type="password" class="form-control" placeholder="Enter Password: " name="psw" required>

            {% if message %}
            <div class="alert alert-warning">
                {{ message }}
            </div>
            {% endif %}

            <button class="btn btn-primary" type="submit">Sign up</button>
        </div>
    </div>
</form>

</body>
</html>
