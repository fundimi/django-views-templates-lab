<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'onlinecourse:popular_course_list' %}">
            Online Course
        </a>

        <div class="ml-auto">
            <a class="btn btn-link" href="{% url 'onlinecourse:registration' %}">
                Sign Up
            </a>
        </div>
    </div>
</nav>

<form action="{% url 'onlinecourse:login' %}" method="post">
    {% csrf_token %}
    <div class="container">
        <h1>Login</h1>

        <div class="form-group">
            <label for="username"><b>User Name</b></label>
            <input id="username" class="form-control" type="text" placeholder="Enter User Name: " name="username" required>

            <label for="psw"><b>Password</b></label>
            <input id="psw" class="form-control" type="password" placeholder="Enter Password: " name="psw" required>
        </div>

        {% if message %}
        <div class="alert alert-warning">
            {{ message }}
        </div>
        {% endif %}

        <button class="btn btn-primary" type="submit">Login</button>
    </div>
</form>

</body>
</html>
